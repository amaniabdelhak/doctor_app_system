<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Dashboard - Doctors</title>
    <link rel="stylesheet" href="doctorslist.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
    <div class="logo">
        <i class='bx bxs-plus-circle'></i> <span>MedBook</span>
    </div>
    <ul class="nav-links">
        <li class="active"><a href="home(1).html"><i class='bx bxs-grid-alt'></i><span>Home</span></a></li>
    </ul>

    <a href="doctor_profile.html" class="profile-circle">
        <i class='bx bxs-user'></i>
    </a>
</nav>

        <main class="main-content">
            <header class="top-bar">
                <h2>Doctors</h2>
                <div class="search-box">
                    <i class='bx bx-search'></i>
                    <input type="text" placeholder="Search Doctor by name or specialty...">
                </div>
               
            </header>

            <section class="doctor-grid">
                <div class="doctor-card">
                    <div class="rating"><i class='bx bxs-star'></i> 4.5</div>
                    <div class="doc-image">
                        <img src="doctor1.jpg" alt="Doctor Photo">
                    </div>
                    <h3>Dr. Topon Kumar</h3>
                    <p class="specialty">Cardiologist</p>
                    <!-- LINK: View Details → doctor-profile.html -->
                    <button class="view-details-btn" onclick="window.location.href='doctor_profile.html'">View Details</button>
                    <div class="card-footer">
                        <span><i class='bx bx-calendar'></i> Availability</span>
                        <span><i class='bx bx-phone'></i> Call</span>
                    </div>
                </div>





                  <div class="doctor-card">
                    <div class="rating"><i class='bx bxs-star'></i> 5.0</div>
                    <div class="doc-image"><img src="doctor3.jpg" alt="Doctor"></div>
                    <h3>Dr. Albert Miles</h3>
                    <p class="specialty">Cardiologist</p>
                    <!-- LINK: View Details → doctor-profile.html -->
                    <button class="view-details-btn" onclick="window.location.href='doctor_profile.html'">View Details</button>
                    <div class="card-footer">
                        <span><i class='bx bx-calendar'></i> Availability</span>
                        <span><i class='bx bx-phone'></i> Call</span>
                    </div>
                </div>






                  <div class="doctor-card">
                    <div class="rating"><i class='bx bxs-star'></i> 5.0</div>
                    <div class="doc-image"><img src="doctor4.jpg" alt="Doctor"></div>
                    <h3>Dr. Albert Miles</h3>
                    <p class="specialty">Cardiologist</p>
                    <!-- LINK: View Details → doctor-profile.html -->
                    <button class="view-details-btn" onclick="window.location.href='doctor_profile.html'">View Details</button>
                    <div class="card-footer">
                        <span><i class='bx bx-calendar'></i> Availability</span>
                        <span><i class='bx bx-phone'></i> Call</span>
                    </div>
                </div>
                
                </section>
        </main>
    </div>
</body>
</html>
