<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thank You</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F2F9FF;min-height:100vh;display:flex;flex-direction:column}

nav{background:#fff;border-bottom:.5px solid #d0e8ff;padding:0 40px;height:60px;display:flex;align-items:center}
.logo{font-size:20px;font-weight:700;color:#0086FF}.logo span{color:#234A6B}

.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}

.check{width:90px;height:90px;background:#0086FF;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:pop .4s ease}
@keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

h1{font-size:32px;font-weight:700;color:#234A6B;margin-bottom:12px}
p{font-size:15px;color:#234A6B;opacity:.65;line-height:1.7;max-width:340px}

.btnHome{margin-top:36px;background:#234A6B;color:#fff;border:none;border-radius:14px;padding:14px 40px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit}
.btnHome:hover{background:#1a3a56}
</style>
</head>
<body>

<nav>
  <div class="logo">Med<span>Book</span></div>
</nav>

<div class="page">
  <div class="check">
    <svg width="40" height="40" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>Thank You! cutie</h1>
  <p>Your appointment has been successfully booked. We wish you good health!</p>
  <!-- ضعي رابط الصفحة الرئيسية بدل # -->
  <a class="btnHome" href="#">Back to Home</a>
</div>

</body>
</html>
